<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Damon Enterprises</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="shortcut icon" href="favicon.ico">

  <style>
    :root{
      --bg:#0a0a0a;
      --text:#f5f5f5;
      --muted:#a1a1aa;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      min-height:100%;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
      display:flex;
      flex-direction:column;
      min-height:100vh;
      overflow-x:hidden;
      overflow-y:auto;
    }

    /* Top login */
    .topbar{
      display:flex;
      justify-content:center;
      padding:24px 0;
      flex:0 0 auto;
    }

    .login-link{
      color:var(--text);
      text-decoration:none;
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      opacity:.85;
      transition:opacity .2s ease;
    }

    .login-link:hover{
      opacity:1;
    }

    /* Center content */
    .main{
      flex:1 1 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    /* LOGO */
    .logo{
      width:clamp(220px, 45vw, 700px);
      height:auto;
      object-fit:contain;
      display:block;

      pointer-events:none;
      -webkit-user-select:none;
      -moz-user-select:none;
      user-select:none;
      -webkit-user-drag:none;
    }

    /* Footer */
    .footer{
      text-align:center;
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      padding:20px 0 26px;
      flex:0 0 auto;
    }

    /* MOBILE */
    @media (max-width: 700px){
      .topbar{
        padding:20px 0 12px;
      }

      .main{
        padding:8px 16px 10px;
      }

      .logo{
        width:64vw;
        max-width:64vw;
      }

      .footer{
        font-size:10px;
        letter-spacing:.12em;
        padding:10px 0 22px;
      }
    }
  </style>
</head>

<body oncontextmenu="return false;">

  <div class="topbar">
    <a href="login.html" class="login-link">Investor Login</a>
  </div>

  <div class="main">
    <img
      src="logo.png"
      class="logo"
      alt="Damon Enterprises logo"
      draggable="false"
    >
  </div>

  <div class="footer">
    © Damon Enterprises 2026
  </div>

</body>
</html>

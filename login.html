<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- PREVENT ZOOM -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

  <title>Investor Login</title>

  <style>
    :root{
      --bg:#0a0a0a;
      --text:#f5f5f5;
      --muted:#9a9a9a;
      --border:rgba(255,255,255,0.18);
      --border-strong:rgba(255,255,255,0.28);
      --danger:#ff5a5a;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
    }

    .shell{
      width:100%;
      max-width:320px;
      border:1px solid var(--border);
      padding:20px;
    }

    .title{
      margin:0 0 18px 0;
      text-align:center;
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    .label{
      display:block;
      margin:0 0 8px 0;
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    /* 🔥 FIX: 16px stops mobile zoom */
    input{
      width:100%;
      background:transparent;
      border:1px solid var(--border);
      color:var(--text);
      padding:10px 12px;
      font-size:16px; /* ← key fix */
      outline:none;
      border-radius:0;
      appearance:none;
      margin-bottom:12px;
    }

    input:focus{
      border-color:var(--border-strong);
    }

    button{
      width:100%;
      background:transparent;
      border:1px solid var(--border);
      color:var(--text);
      padding:10px 12px;
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      cursor:pointer;
    }

    .helper{
      margin-top:12px;
      text-align:center;
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
    }

    .error{
      display:none;
      margin-top:10px;
      text-align:center;
      font-size:11px;
      color:var(--danger);
      text-transform:uppercase;
    }
  </style>
</head>
<body>

  <div class="shell">
    <h1 class="title">Investor Login</h1>

    <label class="label">Invite Code</label>
    <input id="inviteCode" type="password">

    <button onclick="login()">Submit</button>

    <div class="helper">Invite only access</div>
    <div id="error" class="error">Invalid code</div>
  </div>

  <script>
    function login(){
      const code = document.getElementById("inviteCode").value.trim();

      if(code === "ETDA$"){
        window.location.href = "ethan.html";
      } else {
        document.getElementById("error").style.display = "block";
      }
    }
  </script>

</body>
</html>
